<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JSY ANIME</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b0b0b;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 620px;
        }

        h1 {
            color: #ff3b3b;
            font-size: clamp(2rem, 5vw, 2.8rem);
            letter-spacing: 2px;
            margin-bottom: 18px;
        }

        p {
            color: #d0d0d0;
            font-size: clamp(1rem, 2.2vw, 1.15rem);
            line-height: 1.8;
        }

        .donate-btn {
            display: inline-block;
            margin: 28px 0;
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff3b3b, #ff6a3d);
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(255, 59, 59, .35);
            transition: .25s ease;
        }

        .donate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(255, 59, 59, .5);
        }

        .donate-btn:active {
            transform: scale(.98);
        }

        .notice {
            margin-top: 5px;
            padding-top: 18px;
            border-top: 1px solid #2e2e2e;
            color: #ffc107;
            font-size: clamp(.95rem, 2vw, 1.05rem);
        }

        @media (max-width: 480px) {
            .donate-btn {
                width: 100%;
                max-width: 320px;
                padding: 15px;
                font-size: 17px;
            }

            p {
                line-height: 1.7;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>JSY ANIME</h1>

        <p>
            O armazenamento deste anime no Drive possui custos para ser mantido.<br><br>

            Se puder, faça uma doação para ajudar a manter este anime disponível.<br>
            Toda contribuição faz a diferença. ❤️
        </p>

        <!-- Troque o link abaixo pelo da sua página de doação -->
        <a href="https://SEU-LINK-DE-DOACAO" class="donate-btn" target="_blank">
            ❤️ Fazer uma Doação
        </a>

        <div class="notice">
            📺 <strong>Em breve, a versão em 720p deste anime também estará disponível.</strong>
        </div>

    </div>

    <script>
        (function (s) {
            s.dataset.zone = '10964953';
            s.src = 'https://n6wxm.com/vignette.min.js';
        })([document.documentElement, document.body]
            .filter(Boolean)
            .pop()
            .appendChild(document.createElement('script')));
    </script>

</body>

</html>
